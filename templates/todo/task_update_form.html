{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Task</title>
    <!-- حتما لینک فایل CSS را اینجا بگذار -->
    <link rel="stylesheet" href="{% static 'css/login_style.css' %}">
</head>
<body>
    <div class="auth-container">
        <h2>Update Task</h2>
        <hr>
        
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="field-wrapper">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.help_text %}
                        <small class="help-text">{{ field.help_text }}</small>
                    {% endif %}
                    {% for error in field.errors %}
                        <p class="error-msg">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit" class="auth-btn update-btn">Update Task</button>
            
            <a href="{% url 'create-task' %}" class="cancel-link">Cancel & Go Back</a>
        </form>
    </div>
</body>
</html>
